<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi perfil — ClientFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dash-body profile-page">
    <div class="dash-sidebar-overlay" id="dash-sidebar-overlay" hidden aria-hidden="true"></div>

    <aside class="dash-sidebar" id="dash-sidebar" aria-label="Navegación principal">
      <div class="dash-sidebar-brand">
        <a href="index.html" class="logo dash-logo">
          <span class="logo-mark" aria-hidden="true"></span>
          ClientFlow AI
        </a>
      </div>
      <nav class="dash-nav" aria-label="Secciones">
        <a href="dashboard.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--home" aria-hidden="true"></span>
          Dashboard
        </a>
        <a href="chat.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--chat" aria-hidden="true"></span>
          Chat IA
        </a>
        <a href="pedidos.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--inbox" aria-hidden="true"></span>
          Pedidos
        </a>
        <a href="clientes.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--team" aria-hidden="true"></span>
          Clientes
        </a>
        <a href="finanzas.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--finance" aria-hidden="true"></span>
          Finanzas
        </a>
        <a href="campanas.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--spark" aria-hidden="true"></span>
          Campañas IA
        </a>
        <a href="equipo.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--team" aria-hidden="true"></span>
          Equipo
        </a>
        <a href="configuracion.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--gear" aria-hidden="true"></span>
          Configuración
        </a>
      </nav>
    </aside>

    <div class="dash-shell">
      <header class="dash-topbar">
        <button
          type="button"
          class="dash-menu-btn"
          id="dash-menu-btn"
          aria-label="Abrir menú"
          aria-expanded="false"
          aria-controls="dash-sidebar"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="dash-topbar-title">
          <h1 class="dash-business-name" id="dash-business-name">…</h1>
          <span class="dash-business-meta" id="dash-business-meta">…</span>
        </div>
        <div class="dash-topbar-actions">
          <button type="button" class="dash-icon-btn dash-notify" aria-label="Notificaciones">
            <span class="dash-notify-dot" aria-hidden="true"></span>
          </button>
          <button
            type="button"
            class="dash-avatar"
            aria-label="Menú de cuenta"
            aria-expanded="false"
            aria-haspopup="true"
          >
            <span class="dash-avatar-inner" id="dash-avatar-initials" aria-hidden="true">…</span>
          </button>
        </div>
      </header>

      <main class="dash-main" id="dash-main">
        <div class="profile-workspace">
          <a href="configuracion.html" class="profile-back">← Configuración</a>
          <section class="profile-card dash-panel" aria-labelledby="profile-title">
            <h2 id="profile-title" class="profile-title">Tu perfil</h2>
            <p class="profile-lead">Datos de la sesión actual en ClientFlow AI.</p>
            <dl class="profile-dl">
              <div>
                <dt>Correo</dt>
                <dd id="profile-email">—</dd>
              </div>
              <div>
                <dt>ID de usuario</dt>
                <dd id="profile-uid" class="profile-mono">—</dd>
              </div>
            </dl>
            <div class="profile-actions">
              <a href="dashboard.html" class="dash-quick-btn">Ir al dashboard</a>
              <button type="button" class="dash-quick-btn dash-quick-btn--ghost" id="profile-signout">
                Cerrar sesión
              </button>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script type="module" src="profile.js"></script>
  </body>
</html>
