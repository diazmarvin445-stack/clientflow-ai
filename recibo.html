<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Recibo — YourColor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="recibo-page-body">
    <main class="recibo-page-main">
      <p id="recibo-status" class="recibo-status" role="status"></p>
      <article id="recibo-doc" class="orders-receipt-doc recibo-doc" hidden>
        <header class="orders-receipt-brand">
          <div id="recibo-logo-wrap" class="orders-receipt-logo-wrap" hidden></div>
          <h1 id="recibo-business-name" class="orders-receipt-business-name">YourColor Corporation</h1>
          <p id="recibo-contact" class="orders-receipt-meta"></p>
          <p id="recibo-address" class="orders-receipt-meta orders-receipt-address"></p>
          <a href="https://your-color.com" target="_blank" rel="noopener" class="orders-receipt-website">
            Visitar YourColor
          </a>
        </header>
        <div class="orders-receipt-divider" aria-hidden="true"></div>
        <h2 class="orders-receipt-subtitle">Detalle del pedido</h2>
        <dl class="orders-receipt-dl" id="recibo-order-lines"></dl>
        <h2 class="orders-receipt-subtitle recibo-subtitle--spaced">Detalles de pago</h2>
        <dl class="orders-receipt-dl" id="recibo-payment-lines"></dl>
        <div class="recibo-actions">
          <button type="button" class="dash-quick-btn dash-quick-btn--primary" id="recibo-download-pdf">
            Descargar PDF
          </button>
        </div>
      </article>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="module" src="recibo.js"></script>
  </body>
</html>
