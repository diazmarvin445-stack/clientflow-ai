<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Trabajos — ClientFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dash-body jobs-page">
    <div class="dash-sidebar-overlay" id="dash-sidebar-overlay" hidden aria-hidden="true"></div>
    <aside class="dash-sidebar" id="dash-sidebar" aria-label="Navegación principal">
      <div class="dash-sidebar-brand">
        <a href="index.html" class="logo dash-logo"><span class="logo-mark" aria-hidden="true"></span>ClientFlow AI</a>
      </div>
      <nav class="dash-nav" aria-label="Secciones">
        <a href="dashboard.html" class="dash-nav-link"><span class="dash-nav-ico dash-nav-ico--home"></span>Dashboard</a>
        <a href="chat.html#campaigns" class="dash-nav-link"><span class="dash-nav-ico dash-nav-ico--chat"></span>Chat IA + Campañas IA</a>
        <a href="clientes.html" class="dash-nav-link"><span class="dash-nav-ico dash-nav-ico--team"></span>Clientes</a>
        <a href="trabajos.html" class="dash-nav-link is-active" aria-current="page"><span class="dash-nav-ico dash-nav-ico--orders"></span>Trabajos</a>
        <a href="finanzas.html" class="dash-nav-link"><span class="dash-nav-ico dash-nav-ico--finance"></span>Finanzas</a>
        <a href="equipo.html" class="dash-nav-link"><span class="dash-nav-ico dash-nav-ico--team"></span>Equipo</a>
        <a href="configuracion.html" class="dash-nav-link"><span class="dash-nav-ico dash-nav-ico--gear"></span>Configuración</a>
      </nav>
    </aside>
    <div class="dash-shell">
      <header class="dash-topbar">
        <button type="button" class="dash-menu-btn" id="dash-menu-btn" aria-label="Abrir menú" aria-expanded="false" aria-controls="dash-sidebar"><span></span><span></span><span></span></button>
        <div class="dash-topbar-title"><h1 class="dash-business-name" id="dash-business-name">…</h1><span class="dash-business-meta" id="dash-business-meta">…</span></div>
        <div class="dash-topbar-actions">
          <button type="button" class="dash-icon-btn dash-notify" aria-label="Notificaciones"><span class="dash-notify-dot"></span></button>
          <button type="button" class="dash-avatar" aria-label="Menú de cuenta" aria-expanded="false" aria-haspopup="true"><span class="dash-avatar-inner" id="dash-avatar-initials">…</span></button>
        </div>
      </header>
      <main class="dash-main">
        <div class="dash-page">
          <section class="dash-stats" aria-label="Resumen de trabajos">
            <article class="dash-stat-card"><div class="dash-stat-label">Activos</div><p class="dash-stat-value" id="jobs-metric-active">0</p></article>
            <article class="dash-stat-card"><div class="dash-stat-label">Pendientes</div><p class="dash-stat-value" id="jobs-metric-pending">0</p></article>
            <article class="dash-stat-card"><div class="dash-stat-label">Completados</div><p class="dash-stat-value" id="jobs-metric-completed">0</p></article>
            <article class="dash-stat-card"><div class="dash-stat-label">Ganancia estimada</div><p class="dash-stat-value" id="jobs-metric-profit">$0</p></article>
          </section>
          <section class="dash-panel orders-panel">
            <div class="dash-panel-head">
              <h2 class="dash-panel-title">Trabajos</h2>
              <button type="button" class="dash-quick-btn dash-quick-btn--primary orders-btn-compact" id="jobs-btn-add">+ Nuevo trabajo</button>
            </div>
            <div class="orders-filters">
              <select id="jobs-filter-status" class="orders-input">
                <option value="all">Todos los estados</option>
                <option value="pending">Pending</option>
                <option value="in_progress">In progress</option>
                <option value="completed">Completed</option>
                <option value="paid">Paid</option>
              </select>
              <input id="jobs-filter-search" class="orders-input" placeholder="Buscar cliente, tipo o dirección..." />
            </div>
            <div class="dash-table-wrap orders-table-wrap">
              <table class="dash-table">
                <thead><tr><th>Cliente</th><th>Trabajo</th><th>Ubicación</th><th>Fechas</th><th>Estado</th><th>Equipo</th><th>Costos</th><th>Acciones</th></tr></thead>
                <tbody id="jobs-tbody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <dialog id="jobs-modal" class="orders-modal">
      <form method="dialog" id="jobs-form">
        <h3 id="jobs-modal-title">Nuevo trabajo</h3>
        <input type="hidden" id="jobs-id" />
        <div class="orders-grid">
          <select id="jobs-client-id" class="orders-input" required></select>
          <input id="jobs-client-name" class="orders-input" placeholder="Cliente (respaldo)" />
          <input id="jobs-type" class="orders-input" placeholder="Tipo de trabajo" required />
          <input id="jobs-location" class="orders-input" placeholder="Dirección / ubicación" required />
          <input id="jobs-start" class="orders-input" type="date" />
          <input id="jobs-end-est" class="orders-input" type="date" />
          <select id="jobs-status" class="orders-input">
            <option value="pending">pending</option>
            <option value="in_progress">in progress</option>
            <option value="completed">completed</option>
            <option value="paid">paid</option>
          </select>
          <input id="jobs-team" class="orders-input" placeholder="Equipo asignado (nombres separados por coma)" />
          <input id="jobs-materials" class="orders-input" placeholder="Materiales usados (coma)" />
          <input id="jobs-total-cost" class="orders-input" type="number" min="0" step="0.01" placeholder="Costo total" />
          <input id="jobs-total-charged" class="orders-input" type="number" min="0" step="0.01" placeholder="Total cobrado" />
          <textarea id="jobs-notes" class="orders-input orders-notes" placeholder="Notas"></textarea>
        </div>
        <div class="orders-modal-actions">
          <button type="button" class="dash-quick-btn" id="jobs-btn-cancel">Cancelar</button>
          <button type="submit" class="dash-quick-btn dash-quick-btn--primary">Guardar</button>
        </div>
      </form>
    </dialog>
    <script type="module" src="trabajos.js"></script>
  </body>
</html>
