<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanzas — ClientFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dash-body fin-page">
    <div class="dash-sidebar-overlay" id="dash-sidebar-overlay" hidden aria-hidden="true"></div>

    <aside class="dash-sidebar" id="dash-sidebar" aria-label="Navegación principal">
      <div class="dash-sidebar-brand">
        <a href="index.html" class="logo dash-logo">
          <span class="logo-mark" aria-hidden="true"></span>
          ClientFlow AI
        </a>
      </div>
      <nav class="dash-nav" aria-label="Secciones">
        <a href="dashboard.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--home" aria-hidden="true"></span>
          Dashboard
        </a>
        <a href="chat.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--chat" aria-hidden="true"></span>
          Chat IA
        </a>
        <a href="pedidos.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--inbox" aria-hidden="true"></span>
          Pedidos
        </a>
        <a href="finanzas.html" class="dash-nav-link is-active" aria-current="page">
          <span class="dash-nav-ico dash-nav-ico--finance" aria-hidden="true"></span>
          Finanzas
        </a>
        <a href="campanas.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--spark" aria-hidden="true"></span>
          Campañas IA
        </a>
        <a href="equipo.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--team" aria-hidden="true"></span>
          Equipo
        </a>
        <a href="configuracion.html" class="dash-nav-link">
          <span class="dash-nav-ico dash-nav-ico--gear" aria-hidden="true"></span>
          Configuración
        </a>
      </nav>
    </aside>

    <div class="dash-shell">
      <header class="dash-topbar">
        <button
          type="button"
          class="dash-menu-btn"
          id="dash-menu-btn"
          aria-label="Abrir menú"
          aria-expanded="false"
          aria-controls="dash-sidebar"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="dash-topbar-title">
          <h1 class="dash-business-name" id="dash-business-name">…</h1>
          <span class="dash-business-meta" id="dash-business-meta">…</span>
        </div>
        <div class="dash-topbar-actions">
          <button type="button" class="dash-icon-btn dash-notify" aria-label="Notificaciones">
            <span class="dash-notify-dot" aria-hidden="true"></span>
          </button>
          <button
            type="button"
            class="dash-avatar"
            aria-label="Menú de cuenta"
            aria-expanded="false"
            aria-haspopup="true"
          >
            <span class="dash-avatar-inner" id="dash-avatar-initials" aria-hidden="true">…</span>
          </button>
        </div>
      </header>

      <main class="dash-main" id="dash-main">
        <div class="dash-workspace dash-workspace--full fin-workspace">
          <div class="dash-workspace-primary">
            <p class="fin-load-error" id="fin-load-error" hidden role="alert"></p>

            <section class="dash-panel fin-panel" aria-labelledby="fin-panel-title">
              <div class="dash-panel-head">
                <div>
                  <h2 class="dash-panel-title" id="fin-panel-title">Finanzas</h2>
                  <p class="fin-panel-sub" id="fin-meta">Cargando…</p>
                </div>
                <a href="chat.html" class="dash-panel-link">Chat IA con Maya</a>
              </div>

              <div class="fin-summary" id="fin-summary" aria-live="polite">
                <div class="fin-card fin-card--income">
                  <p class="fin-card-label">Ingresos</p>
                  <p class="fin-card-value" id="fin-sum-income">$0</p>
                </div>
                <div class="fin-card fin-card--expense">
                  <p class="fin-card-label">Gastos</p>
                  <p class="fin-card-value" id="fin-sum-expense">$0</p>
                </div>
                <div class="fin-card fin-card--net" id="fin-card-net">
                  <p class="fin-card-label">Balance neto</p>
                  <p class="fin-card-value" id="fin-sum-net">$0</p>
                </div>
              </div>

              <div class="fin-toolbar">
                <div class="fin-filters" role="group" aria-label="Período">
                  <button type="button" class="fin-filter-btn" data-fin-period="today">Hoy</button>
                  <button type="button" class="fin-filter-btn" data-fin-period="week">Esta semana</button>
                  <button type="button" class="fin-filter-btn is-active" data-fin-period="month">
                    Este mes
                  </button>
                  <button type="button" class="fin-filter-btn" data-fin-period="all">Todo</button>
                </div>
              </div>

              <div id="fin-list-root" class="fin-list"></div>
            </section>
          </div>
        </div>
      </main>
    </div>

    <button type="button" class="fin-fab" id="fin-fab-open" aria-label="Agregar movimiento">
      + Agregar movimiento
    </button>

    <div class="fin-modal-host" id="fin-modal-host" hidden aria-hidden="true">
      <div class="fin-modal-backdrop" id="fin-modal-backdrop"></div>
      <div
        class="fin-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="fin-modal-title"
        id="fin-modal"
      >
        <h3 class="fin-modal-title" id="fin-modal-title">Nuevo movimiento</h3>
        <form id="fin-modal-form" class="fin-modal-form">
          <fieldset class="fin-type-row">
            <legend class="visually-hidden">Tipo</legend>
            <label class="fin-radio">
              <input type="radio" name="fin-type" value="income" checked />
              Ingreso
            </label>
            <label class="fin-radio">
              <input type="radio" name="fin-type" value="expense" />
              Gasto
            </label>
          </fieldset>

          <label class="fin-field">
            <span class="fin-field-label">Monto (USD)</span>
            <input
              type="number"
              id="fin-input-amount"
              class="fin-input"
              min="0"
              step="0.01"
              required
              inputmode="decimal"
              placeholder="0.00"
            />
          </label>

          <label class="fin-field">
            <span class="fin-field-label">Categoría</span>
            <select id="fin-select-cat" class="fin-input" required></select>
          </label>

          <label class="fin-field">
            <span class="fin-field-label">Descripción</span>
            <textarea id="fin-input-desc" class="fin-input fin-textarea" rows="3" required></textarea>
          </label>

          <label class="fin-field">
            <span class="fin-field-label">Fecha del movimiento</span>
            <input type="date" id="fin-input-date" class="fin-input" required />
          </label>

          <div class="fin-modal-actions">
            <button type="button" class="dash-quick-btn" id="fin-modal-cancel">Cancelar</button>
            <button type="submit" class="dash-quick-btn dash-quick-btn--primary" id="fin-modal-save">
              Guardar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="finanzas.js"></script>
  </body>
</html>
